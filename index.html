<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            padding: 15px; 
            background-color: #0d0d0d; 
            color: #ffffff; 
            font-family: 'Courier New', Courier, monospace; 
        }
        h3 { 
            font-size: 11px; 
            letter-spacing: 2px; 
            border-bottom: 1px solid #222; 
            padding-bottom: 6px; 
            margin-top: 20px;
            color: #555;
        }
        h3:first-of-type { margin-top: 5px; }
        .btn { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 10px; 
            background-color: #141414; 
            color: #aaa; 
            border: 1px solid #2a2a2a; 
            border-radius: 4px; 
            font-weight: bold; 
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            transition: all 0.15s ease-in-out;
        }
        .btn:hover { 
            background-color: #1f1f1f; 
            color: #fff; 
            border-color: #444;
        }
        .hotsauce { 
            background-color: #ff2200; 
            color: #ffffff; 
            border: none;
            box-shadow: 0px 0px 12px rgba(255, 34, 0, 0.3);
        }
        .hotsauce:hover { 
            background-color: #ff3c1f; 
            color: #ffffff;
            box-shadow: 0px 0px 20px rgba(255, 34, 0, 0.7);
        }
    </style>
</head>
<body>
    <h3>[ SIGNAL UTILITIES ]</h3>
    <button class="btn" id="btnHalftone">⚡ ANALOG HALFTONE</button>
    <button class="btn" id="btnGlass">💎 LIQUID GLASS</button>
    
    <h3>[ PERFORMANCE ENGINE ]</h3>
    <button class="btn hotsauce" id="btnHotSauce">🔥 RED HOT SAUCE</button>

    <script src="index.js"></script>
</body>
</html>
